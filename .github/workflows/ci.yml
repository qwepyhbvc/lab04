name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ========== Linux сборка ==========
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
    steps:
    - uses: actions/checkout@v3
    
    - name: Install CMake
      run: sudo apt-get install -y cmake
    
    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    
    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }}
    
    - name: List build directory (debug)
      run: ls -la build/
    
    - name: Run tests if exist
      run: |
        cd build
        if [ -f ./check ]; then
          ./check
        elif [ -f ./banking_test ]; then
          ./banking_test
        else
          echo "No tests found, build only"
        fi

  # ========== Windows сборка ==========
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    
    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }}
    
    - name: List build directory (debug)
      shell: cmd
      run: dir build /s
    
    - name: Run tests if exist
      shell: cmd
      run: |
        cd build
        if exist check.exe check.exe
        if exist banking_test.exe banking_test.exe
        echo "Build completed"
